name: גיבוי יומי

# מתזמן מובנה ואמין לגיבוי היומי — קורא ל-endpoint /api/cron/backup פעם ביום.
# מחליף מתזמן חיצוני (cron-job.org וכו') שעלול להיעצר. ה-endpoint אידמפוטנטי
# (גיבוי אחד ליום), ולכן ריצה כפולה לא מזיקה.
#
# דרוש GitHub secret: CRON_SECRET (זהה לערך שב-Railway), ומשתנה BACKUP_URL
# (ברירת מחדל https://chasamsofer.co.il).

on:
  schedule:
    # 22:00 UTC = 00:00–01:00 שעון ישראל (תלוי שעון קיץ) — גיבוי לילי.
    - cron: '0 22 * * *'
  workflow_dispatch: {}  # אפשר גם להריץ ידנית מ-GitHub → Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: קריאה ל-endpoint הגיבוי
        run: |
          BASE="${BACKUP_URL:-https://chasamsofer.co.il}"
          echo "מפעיל גיבוי מול $BASE"
          HTTP=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 300 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$BASE/api/cron/backup")
          echo "HTTP $HTTP"
          cat /tmp/out.json || true
          if [ "$HTTP" != "200" ]; then
            echo "::error::הגיבוי נכשל (HTTP $HTTP)"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BACKUP_URL: ${{ vars.BACKUP_URL }}
